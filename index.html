<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Abroad with Syed Nabeel | Global Education Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Reset & Variables */
        :root {
            --primary: #0d47a1;
            --primary-light: #1e5bb8;
            --secondary: #d32f2f;
            --accent: #0284c7;
            --whatsapp: #22c55e;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
            --card-shadow: 0 10px 30px -10px rgba(13, 71, 161, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; 
        }

        body { 
            background-color: #fefefe; 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* Catchy Top Quote Banner - Clean White Alignment */
        .top-quote-banner {
            background: #ffffff;
            color: var(--primary);
            text-align: center;
            padding: 20px;
            font-size: clamp(1rem, 2.8vw, 1.25rem);
            font-weight: 700;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Main Wrapper */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Hero / Advisor Section */
        .hero-section {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
            margin-bottom: 60px;
        }

        .advisor-card {
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
        }

        .advisor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .advisor-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ffffff;
            box-shadow: 0 8px 20px rgba(13, 71, 161, 0.15);
        }

        .advisor-card h1 {
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 5px;
        }

        .tagline {
            color: var(--secondary);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .intro-text {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 550px;
            margin: 0 auto 30px auto;
        }

        .hero-content h2 {
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.2
